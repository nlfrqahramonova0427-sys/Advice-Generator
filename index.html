<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Advice Generator</title>
</head>
<body>

  <main class="advice-card">
    <p class="advice-number">ADVICE #<span id="advice-id">000</span></p>
    
    <h1 class="advice-text" id="advice-text">"Click the dice to get advice..."</h1>

    <div class="divider">
      <img src="./images/pattern-divider-desktop.svg" alt="divider">
    </div>

    <button class="dice-btn" id="dice-btn">
      <img src="./images/icon-dice.svg" alt="dice">
    </button>
  </main>

  <script src="app.js"></script>
</body>
</html>
